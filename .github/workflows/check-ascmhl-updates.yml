name: Check for ASC-MHL Updates
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-ascmhl:
    runs-on: ubuntu-latest
    steps:
      - name: Check PyPI for ascmhl
        id: check
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/ascmhl/json | jq -r .info.version)
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
      
      - name: Open Issue on mhlver Repo
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_BUMP_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/lucuma13/mhlver/issues \
            -d '{
              "title": "Dependency Update: ascmhl ${{ steps.check.outputs.latest_version }}",
              "body": "A new version of ascmhl is available on PyPI. Run '\''poet -f ascmhl'\'' to update the formula resources."
            }'