- name: Open Issue on mhlver Repo
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_BUMP_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/lucuma13/mhlver/issues \
            -d '{
              "title": "Dependency Update: ascmhl ${{ steps.check.outputs.latest_version }}",
              "body": "A new version of ascmhl is available on PyPI. Please test it and update the formula resources."
            }'